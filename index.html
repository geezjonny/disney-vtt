<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beginner Party Sheet — 5.5e</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e14;
  --bg2:#121826;
  --card:#171d2b;
  --line:#283247;
  --line2:#3a4968;
  --text:#ece7dc;
  --muted:#a7a09a;
  --dim:#7b746d;
  --gold:#d8b45a;
  --green:#5ee38d;
  --red:#ff6b6b;
  --blue:#7cc9ff;
  --violet:#b995ff;
  --jasmine:#8dd8a6;
  --wendy:#f5a15a;
  --esmeralda:#d38dff;
  --kristoff:#7fb0ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:radial-gradient(circle at 15% 10%, rgba(124,201,255,.04), transparent 35%),
             radial-gradient(circle at 85% 90%, rgba(185,149,255,.04), transparent 35%),
             var(--bg);
  color:var(--text);
  font-family:'Crimson Pro', Georgia, serif;
  min-height:100vh;
}
button,input,textarea,select{
  font:inherit;
}
.topbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:.5rem;
  background:rgba(11,14,20,.96);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(8px);
}
.brand{
  padding:.8rem 1rem;
  font-family:'Cinzel',serif;
  font-size:.78rem;
  color:var(--blue);
  border-right:1px solid var(--line);
  white-space:nowrap;
}
#save-status{
  margin-left:auto;
  font-size:.65rem;
  color:var(--muted);
  padding:.3rem .8rem;
  white-space:nowrap;
}
.tabs{
  display:flex;
  overflow-x:auto;
  flex:1;
}
.tab{
  background:none;
  border:none;
  border-right:1px solid var(--line);
  border-bottom:2px solid transparent;
  color:var(--dim);
  cursor:pointer;
  padding:.8rem .9rem;
  font-family:'Cinzel',serif;
  font-size:.62rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
}
.tab:hover{color:var(--muted)}
.tab.active{
  color:var(--tab-color, var(--blue));
  border-bottom-color:var(--tab-color, var(--blue));
}

.page{display:none}
.page.active{display:block}

.overview-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  min-height:calc(100vh - 49px);
}
@media (max-width:1100px){
  .overview-grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:700px){
  .overview-grid{grid-template-columns:1fr}
}

.col{
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
}
.col:last-child{border-right:none}

.col-head{
  padding:.9rem .8rem .7rem;
  border-bottom:1px solid var(--line);
  background:var(--head-bg, rgba(124,201,255,.05));
  cursor:pointer;
  position:sticky;
  top:49px;
  z-index:4;
}
.col-name{
  font-family:'Cinzel',serif;
  font-size:.82rem;
  color:var(--accent);
}
.col-sub{
  margin-top:.18rem;
  font-size:.7rem;
  color:var(--dim);
  font-style:italic;
}
.hpbar{
  height:4px;
  background:var(--line);
}
.hpfill{
  height:100%;
  background:var(--accent);
  transition:width .25s ease;
}
.block{
  padding:.7rem .8rem;
  border-bottom:1px solid var(--line);
}
.block-label{
  font-family:'Cinzel',serif;
  font-size:.48rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:.4rem;
}
.hp-mini{
  display:flex;
  align-items:center;
  gap:.35rem;
  margin-bottom:.35rem;
}
.hp-mini input{
  width:44px;
  background:none;
  border:none;
  border-bottom:1px solid var(--line2);
  color:var(--accent);
  text-align:center;
  font-family:'Cinzel',serif;
  font-size:1rem;
  outline:none;
}
.hp-mini .slash{color:var(--line2)}
.hp-mini .max{color:var(--muted); font-size:.8rem}
.temp-row{
  display:flex; align-items:center; gap:.35rem; margin-bottom:.35rem;
}
.temp-row span{
  font-family:'Cinzel',serif;
  font-size:.52rem;
  color:var(--violet);
  letter-spacing:.08em;
}
.temp-row input{
  width:42px;
  background:none;
  border:none;
  border-bottom:1px solid rgba(185,149,255,.35);
  color:var(--violet);
  text-align:center;
  outline:none;
}
.adjust-row{
  display:flex; gap:.25rem;
}
.adjust-row input{
  flex:1;
  min-width:0;
  background:var(--bg2);
  border:1px solid var(--line);
  color:var(--text);
  padding:.3rem .45rem;
  outline:none;
}
.btn{
  background:none;
  border:1px solid var(--line2);
  color:var(--muted);
  cursor:pointer;
  padding:.3rem .5rem;
  font-family:'Cinzel',serif;
  font-size:.55rem;
  letter-spacing:.06em;
}
.btn:hover{color:var(--text)}
.btn.heal{border-color:rgba(94,227,141,.35); color:var(--green)}
.btn.dmg{border-color:rgba(255,107,107,.35); color:var(--red)}
.btn.small{
  padding:.22rem .4rem;
  font-size:.48rem;
}
.chips{
  display:flex; flex-wrap:wrap; gap:.25rem; min-height:1.6rem;
}
.chip{
  padding:.12rem .35rem;
  border:1px solid rgba(255,107,107,.25);
  background:rgba(255,107,107,.06);
  color:var(--red);
  font-family:'Cinzel',serif;
  font-size:.42rem;
  letter-spacing:.05em;
}
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.3rem;
}
.stat-box{
  background:var(--bg2);
  border:1px solid var(--line);
  padding:.35rem .45rem;
}
.stat-k{
  font-family:'Cinzel',serif;
  font-size:.42rem;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.stat-v{
  margin-top:.1rem;
  font-family:'Cinzel',serif;
  font-size:.88rem;
  color:var(--gold);
}
.detail-btn{
  margin:.7rem .8rem .9rem;
  width:calc(100% - 1.6rem);
}

.sheet{
  max-width:980px;
  margin:0 auto;
  padding:1.1rem 1rem 4rem;
}
.sheet-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:1rem;
  border-bottom:1px solid var(--line);
  padding-bottom:1rem;
  margin-bottom:1rem;
}
.sheet-title{
  font-family:'Cinzel',serif;
  font-size:clamp(1.1rem,3vw,1.6rem);
  color:var(--accent);
}
.sheet-meta{
  margin-top:.25rem;
  font-size:.72rem;
  color:var(--muted);
  font-style:italic;
}
.sheet-pill{
  border:1px solid var(--accent);
  color:var(--accent);
  font-family:'Cinzel',serif;
  font-size:.58rem;
  letter-spacing:.1em;
  padding:.35rem .6rem;
  white-space:nowrap;
}

.sec{
  background:var(--card);
  border:1px solid var(--line);
  margin-bottom:.8rem;
  overflow:hidden;
}
.sec-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.5rem;
  cursor:pointer;
  background:var(--bg2);
  border-bottom:1px solid var(--line);
  padding:.55rem .8rem;
}
.sec-title{
  font-family:'Cinzel',serif;
  font-size:.62rem;
  letter-spacing:.12em;
  color:var(--blue);
  text-transform:uppercase;
}
.sec-arrow{
  color:var(--dim);
  font-size:.55rem;
  transition:transform .2s ease;
}
.sec.open .sec-arrow{transform:rotate(90deg)}
.sec-body{display:none; padding:.8rem}
.sec.open .sec-body{display:block}

.hp-big{
  display:flex;
  align-items:center;
  gap:.5rem;
  flex-wrap:wrap;
  background:var(--bg2);
  border:1px solid var(--line);
  padding:.65rem .75rem;
}
.hp-big input{
  width:60px;
  background:none;
  border:none;
  border-bottom:1px solid var(--line2);
  color:var(--red);
  font-family:'Cinzel',serif;
  font-size:1.9rem;
  text-align:center;
  outline:none;
}
.hp-big .slash{font-size:1.2rem; color:var(--line2)}
.hp-big .max{font-family:'Cinzel',serif; color:var(--muted)}
.hp-big .temp-wrap{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:.4rem;
}
.hp-big .temp-wrap span{
  font-family:'Cinzel',serif;
  font-size:.48rem;
  color:var(--violet);
  letter-spacing:.1em;
}
.hp-big .temp-wrap input{
  width:44px;
  font-size:1rem;
  color:var(--violet);
  border-bottom:1px solid rgba(185,149,255,.35);
}
.hp-note{
  margin-top:.45rem;
  font-size:.8rem;
  color:var(--dim);
  font-style:italic;
}
.control-row{
  display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.55rem;
}
.control-row input{
  width:70px;
  background:var(--bg2);
  border:1px solid var(--line);
  color:var(--text);
  padding:.28rem .45rem;
  outline:none;
}
.ds-row{
  display:flex; flex-wrap:wrap; gap:1rem; margin-top:.8rem; align-items:center;
}
.ds-group{
  display:flex; align-items:center; gap:.45rem;
}
.ds-label{
  font-family:'Cinzel',serif;
  font-size:.5rem;
  color:var(--dim);
  letter-spacing:.08em;
  text-transform:uppercase;
}
.ds-dots{display:flex; gap:.22rem}
.ds-dot{
  width:18px; height:18px; border-radius:50%;
  border:1px solid var(--line2);
  background:var(--bg);
  cursor:pointer;
}
.ds-dot.success.on{background:var(--green); border-color:var(--green)}
.ds-dot.fail.on{background:var(--red); border-color:var(--red)}
.inspiration{
  background:none;
  border:1px solid var(--line2);
  color:var(--muted);
  cursor:pointer;
  padding:.28rem .6rem;
  font-family:'Cinzel',serif;
  font-size:.5rem;
  letter-spacing:.08em;
}
.inspiration.on{
  border-color:var(--gold);
  color:var(--gold);
  background:rgba(216,180,90,.06);
}

.resource-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:.5rem;
}
.resource{
  background:var(--bg2);
  border:1px solid var(--line);
  padding:.55rem .65rem;
}
.resource-label{
  font-family:'Cinzel',serif;
  font-size:.5rem;
  color:var(--dim);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:.35rem;
}
.pips{
  display:flex;
  flex-wrap:wrap;
  gap:.3rem;
}
.pip{
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--line2);
  background:rgba(124,201,255,.08);
  color:var(--blue);
  cursor:pointer;
  font-family:'Cinzel',serif;
  font-size:.62rem;
}
.pip.spent{
  background:var(--bg);
  color:transparent;
  border-color:var(--line);
}
.resource-note{
  margin-top:.35rem;
  font-size:.75rem;
  color:var(--dim);
  font-style:italic;
  line-height:1.45;
}

.abilities{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:.35rem;
}
@media (max-width:700px){
  .abilities{grid-template-columns:repeat(3,1fr)}
}
.ability{
  background:var(--bg2);
  border:1px solid var(--line);
  padding:.4rem .2rem;
  text-align:center;
}
.ability .name{
  font-family:'Cinzel',serif;
  font-size:.44rem;
  color:var(--dim);
  letter-spacing:.08em;
  text-transform:uppercase;
}
.ability .score{
  margin-top:.12rem;
  font-family:'Cinzel',serif;
  font-size:1.2rem;
  color:var(--blue);
}
.ability .mod{
  margin-top:.08rem;
  font-family:'Cinzel',serif;
  font-size:.68rem;
  color:var(--gold);
}
.combat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:.35rem;
  margin-top:.5rem;
}
.combat{
  background:var(--bg2);
  border:1px solid var(--line);
  padding:.45rem;
  text-align:center;
}
.combat .k{
  font-family:'Cinzel',serif;
  font-size:.46rem;
  color:var(--dim);
  letter-spacing:.08em;
  text-transform:uppercase;
}
.combat .v{
  margin-top:.15rem;
  font-family:'Cinzel',serif;
  font-size:.95rem;
  color:var(--blue);
}

.attack-wrap{
  background:var(--bg2);
  border:1px solid var(--line);
  padding:.6rem .65rem;
}
.attack-label{
  display:block;
  font-family:'Cinzel',serif;
  font-size:.5rem;
  color:var(--dim);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:.3rem;
}
.attack-wrap select{
  width:100%;
  background:var(--bg);
  border:1px solid var(--line);
  color:var(--text);
  padding:.42rem .5rem;
  outline:none;
  margin-bottom:.5rem;
}
.attack-readout{
  background:var(--bg);
  border:1px solid var(--line);
  padding:.55rem .6rem;
  line-height:1.55;
  font-size:.84rem;
  color:var(--muted);
}
.attack-readout strong{color:var(--text)}
.attack-tip{
  margin-top:.4rem;
  padding:.35rem .45rem;
  background:rgba(94,227,141,.05);
  border:1px solid rgba(94,227,141,.15);
  border-left:2px solid rgba(94,227,141,.35);
  color:var(--muted);
  font-size:.76rem;
  line-height:1.45;
}
.attack-tip strong{color:var(--green)}

.spell-slots{
  display:flex;
  flex-direction:column;
  gap:.35rem;
  margin-bottom:.65rem;
}
.slot-row{
  display:flex;
  align-items:center;
  gap:.35rem;
  flex-wrap:wrap;
}
.slot-label{
  font-family:'Cinzel',serif;
  font-size:.5rem;
  color:var(--violet);
  letter-spacing:.08em;
  min-width:30px;
}
.slot-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  border:1px solid rgba(185,149,255,.4);
  background:rgba(185,149,255,.1);
  cursor:pointer;
}
.slot-dot.spent{
  background:var(--bg);
  border-color:var(--line);
}
.conc-toggle{
  display:inline-block;
  margin-top:.2rem;
  padding:.18rem .42rem;
  border:1px solid rgba(94,227,141,.22);
  color:var(--green);
  font-family:'Cinzel',serif;
  font-size:.48rem;
  letter-spacing:.08em;
  cursor:pointer;
  opacity:.55;
}
.conc-toggle.on{opacity:1}

.note-box{
  width:100%;
  min-height:100px;
  resize:vertical;
  background:var(--bg2);
  border:1px solid var(--line);
  color:var(--text);
  padding:.55rem;
  outline:none;
  line-height:1.5;
}
.note-box::placeholder{
  color:var(--dim);
  font-style:italic;
}

.list{
  display:grid;
  gap:.28rem;
}
.row{
  display:flex;
  align-items:center;
  gap:.45rem;
  padding:.28rem .4rem;
  border:1px solid transparent;
}
.row:hover{background:var(--bg2)}
.row .dot{
  width:8px; height:8px; border-radius:50%;
  border:1px solid var(--line2);
  background:var(--bg);
}
.row.prof .dot{background:var(--blue); border-color:var(--blue)}
.row .left{
  flex:1;
  color:var(--muted);
}
.row .right{
  font-family:'Cinzel',serif;
  color:var(--text);
  font-size:.78rem;
}

.spell-list{display:grid; gap:.35rem}
.spell{
  border:1px solid var(--line);
  background:var(--bg2);
}
.spell-head{
  display:flex;
  align-items:center;
  gap:.45rem;
  padding:.42rem .55rem;
  cursor:pointer;
}
.spell-badge{
  font-family:'Cinzel',serif;
  font-size:.46rem;
  padding:.08rem .28rem;
  border:1px solid var(--line2);
  color:var(--blue);
  white-space:nowrap;
}
.spell-name{
  flex:1;
  color:var(--text);
  font-size:.88rem;
}
.spell-tags{
  display:flex; gap:.25rem; flex-wrap:wrap;
}
.tag{
  font-family:'Cinzel',serif;
  font-size:.44rem;
  color:var(--dim);
}
.spell-arrow{
  color:var(--dim);
  font-size:.52rem;
  transition:transform .2s ease;
}
.spell.open .spell-arrow{transform:rotate(90deg)}
.spell-body{
  display:none;
  border-top:1px solid var(--line);
  padding:.55rem .65rem .65rem;
}
.spell.open .spell-body{display:block}
.spell-meta{
  display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.45rem;
}
.meta{
  background:var(--bg);
  border:1px solid var(--line);
  padding:.15rem .35rem;
}
.meta .k{
  font-family:'Cinzel',serif;
  font-size:.42rem;
  color:var(--dim);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.meta .v{
  margin-top:.04rem;
  font-size:.74rem;
  color:var(--muted);
}
.spell-desc{
  font-size:.84rem;
  color:var(--muted);
  line-height:1.55;
}
.spell-desc strong{color:var(--text)}

.prep-wrap{
  margin-bottom:.8rem;
}
.prep-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.5rem;
  margin-bottom:.45rem;
}
.prep-title{
  font-family:'Cinzel',serif;
  font-size:.54rem;
  color:var(--gold);
  letter-spacing:.08em;
  text-transform:uppercase;
}
.prep-count{
  font-family:'Cinzel',serif;
  font-size:.5rem;
  color:var(--muted);
}
.prep-grid{
  display:grid;
  gap:.35rem;
}
.prep-card{
  border:1px solid var(--line);
  background:var(--bg2);
}
.prep-card.on{
  border-color:rgba(216,180,90,.35);
  box-shadow:inset 0 0 0 1px rgba(216,180,90,.08);
}
.prep-head{
  display:flex;
  align-items:center;
  gap:.5rem;
  padding:.45rem .55rem;
  border-bottom:1px solid var(--line);
}
.prep-check{
  width:16px;
  height:16px;
  accent-color:#d8b45a;
  cursor:pointer;
}
.prep-name{
  flex:1;
  color:var(--text);
  font-size:.84rem;
}
.prep-mini{
  font-family:'Cinzel',serif;
  font-size:.44rem;
  color:var(--dim);
}
.prep-body{
  padding:.45rem .55rem .55rem;
  font-size:.78rem;
  color:var(--muted);
  line-height:1.5;
}
.prep-body strong{color:var(--text)}
.prep-help{
  margin-top:.35rem;
  font-size:.74rem;
  color:var(--dim);
  font-style:italic;
}
.prep-lock{
  opacity:.75;
}


.helper{
  margin-bottom:.55rem;
  padding:.45rem .55rem;
  background:rgba(94,227,141,.05);
  border:1px solid rgba(94,227,141,.14);
  border-left:2px solid rgba(94,227,141,.35);
  font-size:.78rem;
  color:var(--muted);
  line-height:1.5;
}
.helper strong{color:var(--green)}

.warn{
  margin-bottom:.55rem;
  padding:.45rem .55rem;
  background:rgba(255,107,107,.05);
  border:1px solid rgba(255,107,107,.14);
  border-left:2px solid rgba(255,107,107,.35);
  font-size:.78rem;
  color:var(--muted);
  line-height:1.5;
}
.warn strong{color:var(--red)}

.rest-row{
  display:flex;
  gap:.45rem;
  margin-top:.8rem;
}
.rest-btn{
  flex:1;
  background:none;
  border:1px solid var(--line2);
  color:var(--muted);
  cursor:pointer;
  padding:.5rem;
  font-family:'Cinzel',serif;
  font-size:.56rem;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.rest-btn:hover{color:var(--text)}
.rest-btn.short{border-color:rgba(124,201,255,.3); color:var(--blue)}
.rest-btn.long{border-color:rgba(216,180,90,.3); color:var(--gold)}

.conditions-page{
  max-width:980px;
  margin:0 auto;
  padding:1.1rem 1rem 4rem;
}
.conditions-head{
  font-family:'Cinzel',serif;
  font-size:.7rem;
  color:var(--blue);
  letter-spacing:.16em;
  text-transform:uppercase;
  margin-bottom:.35rem;
}
.conditions-sub{
  color:var(--muted);
  font-size:.86rem;
  font-style:italic;
  margin-bottom:1rem;
}
.conditions-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

function structuredCloneSafe(obj){
  return JSON.parse(JSON.stringify(obj));
}

function deepMerge(target, source){
  if (!source || typeof source !== "object") return target;
  for (const key of Object.keys(source)) {
    const s = source[key];
    if (s && typeof s === "object" && !Array.isArray(s)) {
      if (!target[key] || typeof target[key] !== "object" || Array.isArray(target[key])) target[key] = {};
      deepMerge(target[key], s);
    } else {
      target[key] = s;
    }
  }
  return target;
}

function clamp(n, min, max){
  n = Number(n) || 0;
  return Math.max(min, Math.min(max, n));
}

function saveLocal(){
  try{

  }
}

function loadLocal(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(err){
    console.warn("[LocalStorage] Load failed", err);
    return null;
  }
}

function pathGet(obj, path){
  return path.split("/").reduce((acc, part) => acc ? acc[part] : undefined, obj);
}

function pathSet(obj, path, value){
  const parts = path.split("/");
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const p = parts[i];
    if (!cur[p] || typeof cur[p] !== "object") cur[p] = {};
    cur = cur[p];
  }
  cur[parts[parts.length - 1]] = value;
}

function campaignRoot(){

function setSaveStatus(text){
  const el = document.getElementById("save-status");
  if (el) el.textContent = text;
}

function firebaseIsReady(){
  return !!window.fb?.db;
}

function scheduleFlush(){
  saveLocal();
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const payload = { ...PATCH_QUEUE };
    PATCH_QUEUE = {};
    if (!firebaseIsReady()) return;
    try {
      await patchRemote(payload);
    } catch (err) {
      console.error("[Firebase] Patch failed", err);
      setSaveStatus("ERROR");
    }
  }, SAVE_DEBOUNCE_MS);
}

function queuePatch(path, value){
  if (applyingRemoteState) return;
  pathSet(APP_STATE, path, value);
  APP_STATE.updatedAt = Date.now();
  PATCH_QUEUE[path] = value;
  scheduleFlush();
  hydrateUIFromState();
}

window.CO = {
  getState: () => APP_STATE,
  patch(path, value){
    queuePatch(path, value);
  },
  patchMany(obj){
    if (applyingRemoteState) return;
    for (const [path, value] of Object.entries(obj)) {
      pathSet(APP_STATE, path, value);
      PATCH_QUEUE[path] = value;
    }
    APP_STATE.updatedAt = Date.now();
    scheduleFlush();
    hydrateUIFromState();
  },
  async saveNow(){
    saveLocal();
    if (!firebaseIsReady()) return;
    await saveRemoteFull();
  },
  async loadRemote(){
    const remote = await loadRemoteOnce();
    if (remote) {
      APP_STATE = deepMerge(structuredCloneSafe(DEFAULT_STATE), remote);
      window.APP_STATE = APP_STATE;
      saveLocal();
      hydrateUIFromState();
      bindNotes();
    }
    return remote;
  },
  enableLiveSync(flag = true){
    liveSyncEnabled = !!flag;
  }
};

async function saveRemoteFull(){
  if (!firebaseIsReady()) return;
  setSaveStatus("SYNCING");
  const r = window.fb.ref(window.fb.db, campaignRoot());
  const payload = structuredCloneSafe(APP_STATE);
  payload.updatedAt = Date.now();
  APP_STATE.updatedAt = payload.updatedAt;
  await window.fb.set(r, payload);
  setSaveStatus("SYNCED");
}

async function patchRemote(partial){
  if (!firebaseIsReady()) return;
  setSaveStatus("SYNCING");
  const r = window.fb.ref(window.fb.db, campaignRoot());
  const payload = { ...partial, updatedAt: Date.now() };
  APP_STATE.updatedAt = payload.updatedAt;
  await window.fb.update(r, payload);
  setSaveStatus("SYNCED");
}

async function loadRemoteOnce(){
  if (!firebaseIsReady()) return null;
  const r = window.fb.ref(window.fb.db, campaignRoot());
  const snap = await window.fb.get(r);
  return snap.exists() ? snap.val() : null;
}

function subscribeRemote(){
  if (!firebaseIsReady() || !liveSyncEnabled) return;
  const r = window.fb.ref(window.fb.db, campaignRoot());
  window.fb.onValue(r, (snap) => {
    if (!snap.exists()) return;
    const remote = snap.val();
    const localTs = APP_STATE.updatedAt || 0;
    const remoteTs = remote.updatedAt || 0;
    if (remoteTs < localTs) return;
    applyingRemoteState = true;
    APP_STATE = deepMerge(structuredCloneSafe(DEFAULT_STATE), remote);
    window.APP_STATE = APP_STATE;
    saveLocal();
    hydrateUIFromState();
    bindNotes();
    applyingRemoteState = false;
    setSaveStatus("SYNCED");
  });
}

  const n = Math.floor((score - 10) / 2);

function renderResourceBlock(charId, resource){
  const state = APP_STATE.resources?.[charId] || {};
  if (resource.type === "toggle") {
    const on = !!state[resource.key];
    return `
      <div class="resource">
        <div class="resource-label">${resource.label}</div>
        <button class="btn ${on ? "heal" : ""}" onclick="toggleResource('${charId}','${resource.key}')">${on ? "ON" : "OFF"}</button>
        <div class="resource-note">${resource.note}</div>
      </div>
    `;
  }

  const arr = Array.isArray(state[resource.key]) ? state[resource.key] : Array.from({ length: resource.count }, () => true);
  const pips = arr.map((v, idx) => `
    <div class="pip ${v ? "" : "spent"}" onclick="togglePip('${charId}','${resource.key}',${idx})">${idx + 1}</div>
  `).join("");

  return `
    <div class="resource">
      <div class="resource-label">${resource.label}</div>
      <div class="pips">${pips}</div>
      <div class="resource-note">${resource.note}</div>
    </div>
  `;
}

function renderSpellSlots(charId){
  const slots = APP_STATE.spells?.[charId]?.slots || {};
  const levels = Object.keys(slots).sort((a, b) => Number(a) - Number(b));
  if (!levels.length) return "";

  const rows = levels.map(level => {
    const dots = slots[level].map((v, idx) => `
      <div class="slot-dot ${v ? "" : "spent"}" onclick="toggleSpellSlot('${charId}', ${level}, ${idx})"></div>
    `).join("");
    return `
      <div class="slot-row">
        <div class="slot-label">L${level}</div>
        ${dots}
      </div>
    `;
  }).join("");

  const concentrating = !!APP_STATE.spells?.[charId]?.concentrating;

  return `
    <div class="resource" style="margin-bottom:.6rem">
      <div class="resource-label">Spell Slots</div>
      <div class="spell-slots">${rows}</div>
      <div class="conc-toggle ${concentrating ? "on" : ""}" onclick="toggleConcentration('${charId}')">◎ Concentrating</div>
      <div class="resource-note">Tap circles to spend / restore slots. Cantrips do not spend slots. Only one concentration spell at a time.</div>
    </div>
  `;
}

function renderSpell(spell){
  const tags = (spell.tags || []).map(t => `<span class="tag">${t}</span>`).join("");
  const meta = Object.entries(spell.meta || {}).map(([k, v]) => `
    <div class="meta">
      <div class="k">${k}</div>
      <div class="v">${v}</div>
    </div>
  `).join("");

  return `
    <div class="spell">
      <div class="spell-head" onclick="this.parentElement.classList.toggle('open')">
        <div class="spell-badge">${spell.badge}</div>
        <div class="spell-name">${spell.name}</div>
        <div class="spell-tags">${tags}</div>
        <div class="spell-arrow">▶</div>
      </div>
      <div class="spell-body">
        <div class="spell-meta">${meta}</div>
        <div class="spell-desc">${spell.desc}</div>
        <div class="helper" style="margin-top:.45rem"><strong>Beginner use:</strong> ${spell.beginner}</div>
      </div>
    </div>
  `;
}


function getPreparedSelectedIds(charId){
  const selected = APP_STATE.spells?.[charId]?.preparedSelected;
  return Array.isArray(selected) ? selected : [];
}

function getPreparedSelectedSpells(charId){
  const selectedIds = new Set(getPreparedSelectedIds(charId));
  const options = CHARS[charId]?.spells?.preparedOptions || [];
  return options.filter(sp => selectedIds.has(sp.id));
}

function renderSpellPrepSection(charId){
  const c = CHARS[charId];
  const selected = new Set(getPreparedSelectedIds(charId));
  const options = c.spells?.preparedOptions || [];
  const selectedCount = selected.size;
  const max = c.preparedLimit || options.length;

  const cards = options.map(sp => {
    const checked = selected.has(sp.id);
    const disabled = !checked && selectedCount >= max;
    return `
      <div class="prep-card ${checked ? "on" : ""} ${disabled ? "prep-lock" : ""}">
        <div class="prep-head">
          <input
            class="prep-check"
            type="checkbox"
            ${checked ? "checked" : ""}
            ${disabled ? "disabled" : ""}
            onchange="togglePreparedSpell('${charId}','${sp.id}')"
          >
          <div class="prep-name">${sp.name}</div>
          <div class="prep-mini">${sp.badge}</div>
        </div>
        <div class="prep-body">
          <div><strong>Use:</strong> ${sp.beginner}</div>
          <div class="prep-help">${sp.tags?.join(" · ") || ""}</div>
        </div>
      </div>
    `;
  }).join("");

  return `
    <div class="prep-grid">
      <div class="helper"><strong>Prepared spells:</strong> You can toggle which spells are ready to use. Cantrips and “Always Prepared” spells are separate and do not use these checkboxes.</div>
      <div id="prep-counter-${charId}" class="prep-count" style="margin-bottom:.35rem">${selectedCount} / ${max} selected</div>
      ${cards}
    </div>
  `;
}

window.togglePreparedSpell = function(charId, spellId){
  const c = CHARS[charId];
  const max = c.preparedLimit || 99;
  const current = [...getPreparedSelectedIds(charId)];
  const set = new Set(current);

  if (set.has(spellId)) {
    set.delete(spellId);
  } else {
    if (set.size >= max) return;
    set.add(spellId);
  }

  window.CO.patch(`spells/${charId}/preparedSelected`, Array.from(set));
  refreshPreparedSpellUI(charId);
};

function refreshPreparedSpellUI(charId){
  const page = document.getElementById(`page-${charId}`);
  if (!page) return;

  const prepWrap = page.querySelector(".prep-wrap .prep-grid");
  if (prepWrap) {
    prepWrap.outerHTML = renderSpellPrepSection(charId);
  }

  const list = document.getElementById(`prepared-list-${charId}`);
  if (list) {
    list.innerHTML = getPreparedSelectedSpells(charId).map(sp => renderSpell(sp)).join("");
  }
}

function hydrateUIFromState(){
  Object.values(CHARS).forEach(c => {
    const state = APP_STATE.characters[c.id];
    const hp = clamp(state.hp, 0, c.maxHp);
    const percent = Math.round((hp / c.maxHp) * 100);

    const obHp = document.getElementById(`ob-${c.id}-hp`);
    if (obHp && Number(obHp.value) !== hp) obHp.value = hp;

    const detHp = document.getElementById(`det-${c.id}-hp`);
    if (detHp && Number(detHp.value) !== hp) detHp.value = hp;

    const obTmp = document.getElementById(`ob-${c.id}-tmp`);
    if (obTmp && Number(obTmp.value) !== (state.tempHp || 0)) obTmp.value = state.tempHp || 0;

    const detTmp = document.getElementById(`det-${c.id}-tmp`);
    if (detTmp && Number(detTmp.value) !== (state.tempHp || 0)) detTmp.value = state.tempHp || 0;

    const bar = document.getElementById(`ob-${c.id}-bar`);
    if (bar) bar.style.width = `${percent}%`;

    const condHtml = (state.conditions || []).map(name => `<span class="chip">${name}</span>`).join("");
    const obConds = document.getElementById(`ob-${c.id}-conds`);
    if (obConds) obConds.innerHTML = condHtml;

    const detConds = document.getElementById(`det-${c.id}-conds`);
    if (detConds) detConds.innerHTML = condHtml;

    hydrateDeathSaves(c.id);
    hydrateInspiration(c.id);
    hydrateConditionToggles(c.id);
    hydrateNotes(c.id);
    hydrateAttackSelect(c.id);
    refreshPreparedSpellUI(c.id);
  });

  Object.keys(CHARS).forEach(cid => {
    const page = document.getElementById(`page-${cid}`);
    if (page && page.innerHTML) {
      const sec = page.querySelector(".sec:nth-child(5) .sec-body");
      if (sec) {
        const slotContainer = sec.querySelector(".resource");
        if (slotContainer) {
          slotContainer.outerHTML = renderSpellSlots(cid);
          const rg = sec.querySelector(".resource-grid");
          if (rg) {
            rg.innerHTML = (CHARS[cid].resources || []).map(r => renderResourceBlock(cid, r)).join("");
          }
        }
      }
    }
  });
}

function hydrateDeathSaves(charId){
  const state = APP_STATE.characters[charId];
  const successWrap = document.getElementById(`ds-success-${charId}`);
  const failWrap = document.getElementById(`ds-fail-${charId}`);
  if (successWrap) {
    successWrap.innerHTML = Array.from({ length: 3 }, (_, i) => `
      <div class="ds-dot success ${i < state.deathSuccesses ? "on" : ""}" onclick="setDeathSave('${charId}','success',${i + 1})"></div>
    `).join("");
  }
  if (failWrap) {
    failWrap.innerHTML = Array.from({ length: 3 }, (_, i) => `
      <div class="ds-dot fail ${i < state.deathFails ? "on" : ""}" onclick="setDeathSave('${charId}','fail',${i + 1})"></div>
    `).join("");
  }
}

function hydrateInspiration(charId){
  const btn = document.getElementById(`insp-${charId}`);
  if (!btn) return;
  const on = !!APP_STATE.characters[charId].inspiration;
  btn.classList.toggle("on", on);
}

function hydrateConditionToggles(charId){
  const wrap = document.getElementById(`cond-toggle-${charId}`);
  if (!wrap) return;
  const active = new Set(APP_STATE.characters[charId].conditions || []);
  wrap.innerHTML = CONDITIONS.map(c => {
    const on = active.has(c.name);
    return `<button class="btn small ${on ? "dmg" : ""}" onclick="toggleCondition('${charId}','${escapeAttr(c.name)}')">${c.name}</button>`;
  }).join("");
}

function hydrateNotes(charId){
  const ta = document.getElementById(`notes-${charId}`);
  if (!ta) return;
  const next = APP_STATE.characters[charId].notes || "";
  if (ta.value !== next) ta.value = next;
}

function bindNotes(){
  Object.keys(CHARS).forEach(charId => {
    const ta = document.getElementById(`notes-${charId}`);
    if (!ta || ta.dataset.bound === "1") return;
    ta.dataset.bound = "1";
    ta.addEventListener("input", () => {
      window.CO.patch(`characters/${charId}/notes`, ta.value);
    });
  });
}

function hydrateAttackSelect(charId){
  const select = document.getElementById(`attack-select-${charId}`);
  if (!select) return;

  if (select.dataset.built !== "1") {
    select.dataset.built = "1";
    select.innerHTML = "";
    CHARS[charId].attacks.forEach((atk, idx) => {
      const opt = document.createElement("option");
      opt.value = atk.id;
      opt.textContent = atk.name;
      select.appendChild(opt);
      if (idx === 0) select.value = atk.id;
    });
  }

  selectAttack(charId, select.value || CHARS[charId].attacks[0]?.id);
}

window.selectAttack = function(charId, attackId){
  const atk = (CHARS[charId].attacks || []).find(a => a.id === attackId) || CHARS[charId].attacks[0];
  const out = document.getElementById(`attack-readout-${charId}`);
  const select = document.getElementById(`attack-select-${charId}`);

  if (select && select.value !== atk.id) select.value = atk.id;
  if (!out || !atk) return;

  out.innerHTML = `
    <div><strong>Action Type:</strong> ${atk.action}</div>
    <div><strong>What to roll:</strong> ${atk.toHit}</div>
    <div><strong>If it works:</strong> ${atk.damage}</div>
    ${atk.range ? `<div><strong>Range:</strong> ${atk.range}</div>` : ""}
    ${atk.notes ? `<div><strong>Use it when:</strong> ${atk.notes}</div>` : ""}
    ${atk.defense ? `<div><strong>How to avoid getting hit while using it:</strong> ${atk.defense}</div>` : ""}
  `;
};

function setCharHp(charId, hp){
  const c = CHARS[charId];
  hp = clamp(hp, 0, c.maxHp);
  window.CO.patch(`characters/${charId}/hp`, hp);
}

function setCharTemp(charId, tempHp){
  tempHp = Math.max(0, Number(tempHp) || 0);
  window.CO.patch(`characters/${charId}/tempHp`, tempHp);
}

function adjustHp(charId, delta){
  const c = APP_STATE.characters[charId];
  const maxHp = CHARS[charId].maxHp;
  let hp = Number(c.hp) || 0;
  let tempHp = Number(c.tempHp) || 0;
  delta = Number(delta) || 0;

  if (delta < 0) {
    let dmg = Math.abs(delta);
    if (tempHp > 0) {
      const absorbed = Math.min(tempHp, dmg);
      tempHp -= absorbed;
      dmg -= absorbed;
    }
    hp = Math.max(0, hp - dmg);
  } else {
    hp = Math.min(maxHp, hp + delta);
  }

  window.CO.patchMany({
    [`characters/${charId}/hp`]: hp,
    [`characters/${charId}/tempHp`]: tempHp
  });
}

window.ovSyncHP = function(charId){
  const input = document.getElementById(`ob-${charId}-hp`);
  if (!input) return;
  setCharHp(charId, Number(input.value || 0));
};

window.detSyncHP = function(charId){
  const input = document.getElementById(`det-${charId}-hp`);
  if (!input) return;
  setCharHp(charId, Number(input.value || 0));
};

window.ovSyncTmp = function(charId){
  const input = document.getElementById(`ob-${charId}-tmp`);
  if (!input) return;
  setCharTemp(charId, Number(input.value || 0));
};

window.detSyncTmp = function(charId){
  const input = document.getElementById(`det-${charId}-tmp`);
  if (!input) return;
  setCharTemp(charId, Number(input.value || 0));
};

window.ovAdj = function(charId, sign){
  const input = document.getElementById(`ob-${charId}-amt`);
  const amt = Math.max(0, Number(input?.value || 0));
  if (!amt) return;
  adjustHp(charId, sign > 0 ? amt : -amt);
  if (input) input.value = "";
};

window.detAdj = function(charId, sign){
  const input = document.getElementById(`det-${charId}-amt`);
  const amt = Math.max(0, Number(input?.value || 0));
  if (!amt) return;
  adjustHp(charId, sign > 0 ? amt : -amt);
  if (input) input.value = "";
};

window.fullHeal = function(charId){
  const c = CHARS[charId];
  window.CO.patchMany({
    [`characters/${charId}/hp`]: c.maxHp,
    [`characters/${charId}/tempHp`]: 0,
    [`characters/${charId}/deathSuccesses`]: 0,
    [`characters/${charId}/deathFails`]: 0
  });
};

window.setDeathSave = function(charId, kind, count){
  if (kind === "success") {
    window.CO.patch(`characters/${charId}/deathSuccesses`, count);
  } else {
    window.CO.patch(`characters/${charId}/deathFails`, count);
  }
};

window.toggleInspiration = function(charId){
  const cur = !!APP_STATE.characters[charId].inspiration;
  window.CO.patch(`characters/${charId}/inspiration`, !cur);
};

window.togglePip = function(charId, key, idx){
  const arr = Array.isArray(APP_STATE.resources?.[charId]?.[key])
    ? [...APP_STATE.resources[charId][key]]
    : [];
  if (arr[idx] == null) return;
  arr[idx] = !arr[idx];
  window.CO.patch(`resources/${charId}/${key}`, arr);
};

window.toggleResource = function(charId, key){
  const cur = !!APP_STATE.resources?.[charId]?.[key];
  window.CO.patch(`resources/${charId}/${key}`, !cur);
};

window.toggleSpellSlot = function(charId, level, idx){
  const slots = APP_STATE.spells?.[charId]?.slots?.[level];
  if (!Array.isArray(slots) || slots[idx] == null) return;
  const next = [...slots];
  next[idx] = !next[idx];
  window.CO.patch(`spells/${charId}/slots/${level}`, next);
};

window.toggleConcentration = function(charId){
  const cur = !!APP_STATE.spells?.[charId]?.concentrating;
  window.CO.patch(`spells/${charId}/concentrating`, !cur);
};

window.toggleCondition = function(charId, name){
  const cur = new Set(APP_STATE.characters[charId].conditions || []);
  if (cur.has(name)) cur.delete(name);
  else cur.add(name);
  window.CO.patch(`characters/${charId}/conditions`, Array.from(cur));
};

window.shortRest = function(charId){
  const updates = {};

  if (charId === "kristoff") {
    updates[`resources/${charId}/actionSurge`] = [true];
    updates[`resources/${charId}/secondWind`] = [true];
  }

  if (charId === "esmeralda") {
    updates[`resources/${charId}/bardicInspiration`] = [true, true, true];
  }

  if (Object.keys(updates).length) {
    window.CO.patchMany(updates);
  }
};

window.longRest = function(charId){
  const updates = {
    [`characters/${charId}/hp`]: CHARS[charId].maxHp,
    [`characters/${charId}/tempHp`]: 0,
    [`characters/${charId}/deathSuccesses`]: 0,
    [`characters/${charId}/deathFails`]: 0,
    [`characters/${charId}/conditions`]: []
  };

  const c = CHARS[charId];

  if (c.spells?.slots) {
    updates[`spells/${charId}/slots`] = structuredCloneSafe(c.spells.slots);
    updates[`spells/${charId}/concentrating`] = false;
  }

  if (charId === "wendy") {
    updates[`resources/${charId}/warPriest`] = [true, true, true];
    updates[`resources/${charId}/channelDivinity`] = [true];
    updates[`resources/${charId}/concentration`] = false;
  }

  if (charId === "esmeralda") {
    updates[`resources/${charId}/bardicInspiration`] = [true, true, true];
    updates[`resources/${charId}/concentration`] = false;
  }

  if (charId === "kristoff") {
    updates[`resources/${charId}/secondWind`] = [true];
    updates[`resources/${charId}/actionSurge`] = [true];
    updates[`resources/${charId}/concentration`] = false;
  }

  if (charId === "jasmine") {
    updates[`resources/${charId}/concentration`] = false;
  }

  window.CO.patchMany(updates);
};

window.toggleSection = function(head){
  const sec = head.closest(".sec");
  if (sec) sec.classList.toggle("open");
};

window.showPage = function(pageId, btn){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const page = document.getElementById(`page-${pageId}`);
  if (page) page.classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (btn) btn.classList.add("active");
  else {
    const tab = Array.from(document.querySelectorAll(".tab")).find(t => {
      const label = t.textContent.trim().toLowerCase();
      return label === pageId.toLowerCase();
    });
    if (tab) tab.classList.add("active");
  }

  window.CO.patch("overview/activePage", pageId);
};

function escapeAttr(str){
  return String(str).replaceAll("'", "\\'");
}

function initFirebase(){
  const hasPlaceholder = Object.values(window.FIREBASE_CONFIG).some(v => String(v).includes("YOUR_"));
  if (hasPlaceholder) {
    console.warn("[Firebase] Placeholder config detected. Running local-only.");
    setSaveStatus("LOCAL ONLY");
    return;
  }

  const app = initializeApp(window.FIREBASE_CONFIG);
  const db = getDatabase(app);
  const auth = getAuth(app);

  signInAnonymously(auth)
    .then(() => {
      window.fb = { db, auth, ref, set, update, get, onValue };
      firebaseReady = true;
      window.dispatchEvent(new CustomEvent("firebase-ready"));
    })
    .catch(err => {
      console.error("[Firebase] Anonymous auth failed", err);
      setSaveStatus("AUTH ERR");
    });
}

async function initSync(){
  if (!firebaseIsReady()) return;
  try {
    const remote = await loadRemoteOnce();
    if (!remote) {
      await saveRemoteFull();
    } else {
      const localTs = APP_STATE.updatedAt || 0;
      const remoteTs = remote.updatedAt || 0;
      if (remoteTs >= localTs) {
        APP_STATE = deepMerge(structuredCloneSafe(DEFAULT_STATE), remote);
        window.APP_STATE = APP_STATE;
        saveLocal();
        hydrateUIFromState();
        bindNotes();
      } else {
        await saveRemoteFull();
      }
    }
    subscribeRemote();
  } catch (err) {
    console.error("[Firebase] Init sync failed", err);
    setSaveStatus("ERROR");
  }
}

function buildAll(){
  buildOverview();
  Object.keys(CHARS).forEach(buildCharacterPage);
  buildConditionsPage();
  hydrateUIFromState();
  bindNotes();

  const activePage = APP_STATE.overview?.activePage || "overview";
  const tab = Array.from(document.querySelectorAll(".tab")).find(t => t.textContent.trim().toLowerCase() === activePage.toLowerCase());
  showPage(activePage, tab || document.querySelector(".tab"));
}

document.addEventListener("DOMContentLoaded", async () => {
  buildAll();
  initFirebase();
});

window.addEventListener("firebase-ready", async () => {
  await initSync();
});
</script>
